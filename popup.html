<!DOCTYPE html>
<html>
  <head>
    <title>My Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="header">
      <!-- <img class="header-icon" src="assets/openai.png">       -->
      <h1 class="header-title">Message Index</h1>
      <button id="settingsBtn" title="Settings" class="settings-btn">Settings</button>
    </div>
    <div class="controls">
      <button id="copyBtn" class="ctrl-btn primary" title="Copy messages">Copy</button>
      <button id="pasteAllBtn" class="ctrl-btn primary" title="Paste all messages">Paste All</button>
      <button id="pasteOneBtn" class="ctrl-btn secondary" title="Paste one-by-one">Paste One-by-One</button>
    </div>
    <div id="messages" class="loading"></div>
    <script src="popup.js"></script>
  </body>
</html>
